      if (/где брать отел|топ ?3 район|перевод лир|даты|темп|транспорт|одежда|заселение/.test(text)) return false;

        .filter(isAttractionCandidate)
        .map(attractionNameFromElement)
        .filter(function (name) {

      });
      if (!heading) return null;

      var ownBlock = heading.closest(BLOCK_SELECTOR);
      if (ownBlock && ownBlock !== document.body && ownBlock !== document.documentElement) return ownBlock;

      var next = heading.nextElementSibling;
      while (next && !next.matches("h2, h3")) {
        if (next.matches(BLOCK_SELECTOR) || /map|route/.test(classText(next))) return next;
        next = next.nextElementSibling;
      }

      return heading.parentElement;
    }

    function enrichRouteMap() {
      return;
    }

    function groupHeadingRuns(root, elements) {
      var blocks = [];
      var children = Array.prototype.slice.call(root.children);
      var allowedBlocks = new Set(elements);
      var current = [];

      function flush() {
        if (!current.length) return;
        if (current.length === 1 && (current[0].matches(BLOCK_SELECTOR) || allowedBlocks.has(current[0]))) {
          blocks.push(current[0]);
        } else {
          var wrapper = document.createElement("section");
          wrapper.className = "trip-generated-block";
          root.insertBefore(wrapper, current[0]);
          current.forEach(function (element) { wrapper.appendChild(element); });
          blocks.push(wrapper);
        }
        current = [];
      }

      children.forEach(function (child) {
        if (!isUsableElement(child)) return;
        if (child.matches("h1, header")) {
          flush();
          return;
        }
        if (child.matches("h2, h3")) {
          flush();
          current.push(child);
          return;
        }
        if (child.matches(BLOCK_SELECTOR) || allowedBlocks.has(child)) {
          if (current.length) {
            current.push(child);
            flush();
          } else {
            blocks.push(child);
          }
          return;
        }
        if (current.length) current.push(child);
      });
      flush();

      if (blocks.length >= 2) return blocks;
      return elements;
    }

    function createReferenceHeader() {
      var header = document.createElement("header");
      header.className = "trip-reference-header";

      var brand = document.createElement("div");
      brand.className = "trip-brand";
      var mark = document.createElement("span");
      mark.className = "trip-brand__mark";
      mark.setAttribute("aria-hidden", "true");
      var brandText = document.createElement("div");
      var title = document.createElement("h1");
      title.className = "trip-brand__title";
      title.textContent = "Istanbul 2026";
      var subtitle = document.createElement("p");
      subtitle.className = "trip-brand__subtitle";
      subtitle.textContent = "Справочник поездки";
      brandText.appendChild(title);
      brandText.appendChild(subtitle);
      brand.appendChild(mark);
      brand.appendChild(brandText);

      var search = document.createElement("label");
      search.className = "trip-search";
      var searchText = document.createElement("span");
      searchText.textContent = "Поиск по справочнику";
      searchText.style.position = "absolute";
      searchText.style.width = "1px";
      searchText.style.height = "1px";
      searchText.style.overflow = "hidden";
      searchText.style.clip = "rect(0 0 0 0)";
      var input = document.createElement("input");
      input.type = "search";
      input.setAttribute("data-trip-search", "true");
      input.placeholder = "Поиск: транспорт, музей, SIM, лиры";
      search.appendChild(searchText);
      search.appendChild(input);

      var actions = document.createElement("div");
      actions.className = "trip-header-actions";
      ["RU", "Офлайн-копии"].forEach(function (text) {
        var item = document.createElement("span");
        item.textContent = text;
        actions.appendChild(item);
      });

      header.appendChild(brand);
      header.appendChild(search);
      header.appendChild(actions);
      return header;
    }

    function buildTabs(root, blocks) {
      var firstBlock = blocks[0];
      var shell = document.createElement("div");
      shell.className = "trip-tab-shell";

      var header = createReferenceHeader();
      var layout = document.createElement("div");
      layout.className = "trip-reference-layout";

      var nav = document.createElement("nav");
      nav.className = "trip-tabs";
      nav.setAttribute("role", "tablist");
      nav.setAttribute("aria-label", "Разделы поездки");

      var main = document.createElement("div");
      main.className = "trip-reference-main";

      var panelsWrap = document.createElement("div");
      panelsWrap.className = "trip-tab-panels";

      var groups = {};
      TAB_DEFS.forEach(function (tab) {
        groups[tab.id] = { def: tab, blocks: [] };
      });

      blocks.forEach(function (block) {
        var category = categoryFor(block);
        if (groups[category]) groups[category].blocks.push(block);
      });

      var activeTabs = TAB_DEFS.filter(function (tab) {
        return groups[tab.id].blocks.length > 0;
      });

      if (activeTabs.length < 2) return false;

      var host = firstBlock.parentElement || root;
      host.insertBefore(shell, firstBlock);
      shell.appendChild(header);
      shell.appendChild(layout);
      layout.appendChild(nav);
      layout.appendChild(main);
      main.appendChild(panelsWrap);

      var buttons = {};
      var panels = {};
      var activeTabId = activeTabs[0].id;

      function activate(tabId, options) {
        options = options || {};
        activeTabId = tabId;
        activeTabs.forEach(function (tab) {
          var isActive = tab.id === tabId;
          buttons[tab.id].setAttribute("aria-selected", String(isActive));
          panels[tab.id].hidden = !isActive;
        });
        if (!options.skipScroll) shell.scrollIntoView({ block: "start", behavior: "smooth" });
      }

      activeTabs.forEach(function (tab, index) {
        var button = document.createElement("button");
        button.className = "trip-tabs__button";
        button.type = "button";
        button.id = "trip-tab-" + tab.id;
        button.textContent = tab.label;
        button.setAttribute("role", "tab");
        button.setAttribute("aria-controls", "trip-panel-" + tab.id);
        button.setAttribute("aria-selected", index === 0 ? "true" : "false");
        button.addEventListener("click", function () { activate(tab.id); });
        nav.appendChild(button);
        buttons[tab.id] = button;

        var panel = document.createElement("section");
        panel.className = "trip-tab-panel";
        panel.id = "trip-panel-" + tab.id;
        panel.setAttribute("role", "tabpanel");
        panel.setAttribute("aria-labelledby", button.id);
        panel.hidden = index !== 0;
        groups[tab.id].blocks.forEach(function (block) {
          panel.appendChild(block);
        });
        var empty = document.createElement("div");
        empty.className = "trip-empty-search";
        empty.hidden = true;
        empty.textContent = "В этой теме ничего не найдено. Попробуйте другой запрос или откройте соседнюю вкладку.";
        panel.appendChild(empty);
        panelsWrap.appendChild(panel);
        panels[tab.id] = panel;
      });

      function panelBlocks(panel) {
        return Array.prototype.slice.call(panel.children).filter(function (child) {
          return !child.classList.contains("trip-empty-search");
        });
      }

      function applySearch(value) {
        var query = textKey(value);
        var firstMatch = "";
        var firstSpecificMatch = "";

        activeTabs.forEach(function (tab) {
          var panel = panels[tab.id];
          var count = 0;
          panelBlocks(panel).forEach(function (block) {
            var matched = !query || textKey(block.textContent).indexOf(query) >= 0;
            block.classList.toggle("trip-block-hidden", !matched);
            if (matched) count += 1;
          });

          var empty = panel.querySelector(".trip-empty-search");
          if (empty) empty.hidden = !query || count > 0;

          if (query && count > 0 && !firstMatch) firstMatch = tab.id;
          if (query && count > 0 && tab.id !== "overview" && !firstSpecificMatch) firstSpecificMatch = tab.id;
          if (query && count > 0) {
            buttons[tab.id].setAttribute("data-search-match", String(count));
          } else {
            buttons[tab.id].removeAttribute("data-search-match");
          }
        });

        if (!query) {
          activate(activeTabId, { skipScroll: true });
          return;
        }
        if (firstSpecificMatch || firstMatch) activate(firstSpecificMatch || firstMatch, { skipScroll: true });
      }

      var searchInput = header.querySelector("[data-trip-search]");
      if (searchInput) {
        searchInput.addEventListener("input", function () {
          applySearch(searchInput.value);
        });
        searchInput.addEventListener("keydown", function (event) {
          if (event.key === "Escape") {
            searchInput.value = "";
            applySearch("");
          }
        });
      }

      nav.addEventListener("keydown", function (event) {
        if (event.key !== "ArrowRight" && event.key !== "ArrowLeft") return;
        var current = activeTabs.findIndex(function (tab) { return buttons[tab.id] === document.activeElement; });
        if (current < 0) return;
        event.preventDefault();
        var next = event.key === "ArrowRight" ? current + 1 : current - 1;
        buttons[activeTabs[(next + activeTabs.length) % activeTabs.length].id].focus();
      });

      return true;
    }

    function initTripTabs() {
      document.documentElement.classList.add("trip-reference-mode");
      removeHotelTopAreas();
      hideLargeHero();
      hideIntroTitleBlocks();
      var root = findRoot();
      removeUnwantedTripText(root);
      normalizeTripHeadings(root);
      upgradeCurrencyConverter(root);
      suppressOriginalFoodBlocks(root);
      appendReferenceSections(root);
      appendFoodRecommendations(root);
      appendTravelDocsChecklist(root);
      var blocks = candidateBlocks(root);
      var built = blocks.length >= 2 && buildTabs(root, blocks);

      if (!built) {
        blocks = fallbackHeadingBlocks(document.querySelector("main, [role='main']") || document.body);
        built = blocks.length >= 2 && buildTabs(blocks[0].parentElement || root, blocks);
      }

      if (!built) {
        blocks = fallbackDirectBlocks(root);
        built = blocks.length >= 2 && buildTabs(root, blocks);
      }

      if (built) applyStoredChecklistState(document);
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", initTripTabs);
    } else {
      initTripTabs();
    }
  })();
<\/script>`;

    function addTripTabs(html) {
      if (html.includes("istanbul-trip-tabs-script")) return html;
      const withStyle = /<\/head>/i.test(html)
        ? html.replace(/<\/head>/i, `${tripTabsStyle}\n</head>`)
        : `${tripTabsStyle}\n${html}`;
      return /<\/body>/i.test(withStyle)
        ? withStyle.replace(/<\/body>/i, `${tripTabsScript}\n</body>`)
        : `${withStyle}\n${tripTabsScript}`;
    }

    const passwordCookieName = "istanbul_trip_password";
    const passwordCookieMaxAge = 60 * 60 * 24 * 180;

    function passwordCookiePath() {
      const path = window.location.pathname || "/";
      if (path.endsWith("/")) return path;
      const lastSlash = path.lastIndexOf("/");
      return lastSlash >= 0 ? path.slice(0, lastSlash + 1) : "/";
    }

    function getPasswordCookie() {
      const prefix = `${passwordCookieName}=`;
      const parts = document.cookie ? document.cookie.split("; ") : [];
      const match = parts.find((part) => part.startsWith(prefix));
      if (!match) return "";
      try {
        return decodeURIComponent(match.slice(prefix.length));
      } catch (_) {
        return "";
      }
    }

    function setPasswordCookie(password) {
      const secure = window.location.protocol === "https:" ? "; Secure" : "";
      document.cookie = `${passwordCookieName}=${encodeURIComponent(password)}; Max-Age=${passwordCookieMaxAge}; Path=${passwordCookiePath()}; SameSite=Lax${secure}`;
    }

    function clearPasswordCookie() {
      const secure = window.location.protocol === "https:" ? "; Secure" : "";
      document.cookie = `${passwordCookieName}=; Max-Age=0; Path=${passwordCookiePath()}; SameSite=Lax${secure}`;
    }

    async function unlockAndRender(password, rememberPassword) {
      const html = await unlock(password);
      if (rememberPassword) setPasswordCookie(password);
      document.open();
      document.write(addTripTabs(html));
      document.close();
    }

    document.getElementById("unlockForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const error = document.getElementById("error");
      error.textContent = "";
      try {
        await unlockAndRender(document.getElementById("password").value.trim(), true);
      } catch (_) {
        error.textContent = "Wrong password.";
      }
    });

    (async () => {
      const savedPassword = getPasswordCookie();
      if (!savedPassword) return;
      try {
        await unlockAndRender(savedPassword, true);
      } catch (_) {
        clearPasswordCookie();
      }
    })();
  </script>
